<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RandOS</title>
  <!-- Pixel display font for the boot splash only (scoped in css/base.css to
       .boot-wordmark/.boot-tagline). Falls back to monospace if blocked/offline.
       The randomized app fonts stay web-safe stacks (see js/randomizer.js). -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
</head>
<body>
  <div id="desktop">
    <div id="icons"></div>
    <div id="taskbar"><span class="spacer"></span></div>
  </div>

  <script src="js/randomizer.js"></script>
  <script src="js/particles.js"></script>
  <script src="js/cursor.js"></script>
  <script src="js/wallpaper.js"></script>
  <script src="js/calc-math.js"></script>
  <script src="js/pixel-icons.js"></script>
  <script src="js/windows.js"></script>
  <script src="js/apps/calculator.js"></script>
  <script src="js/apps/clock.js"></script>
  <script src="js/apps/calendar.js"></script>
  <script src="js/apps/randomizer-app.js"></script>
  <script src="js/sound-manifest.js"></script>
  <script src="js/apps/soundboard.js"></script>
  <script src="js/apps/suggestion-box.js"></script>
  <script src="js/apps/quote.js"></script>
  <script src="js/apps/spinner.js"></script>
  <script src="js/desktop.js"></script>

  <!-- Boot overlay: covers the screen from first paint so the desktop never
       flashes before the jack-in-the-box plays. boot.js either runs the
       animation or removes this instantly if already booted this session.
       Kept LAST in <body> and given an opaque background via .boot-cover so
       it paints over everything immediately, before boot.js even runs. -->
  <div id="boot" class="boot-cover" aria-hidden="true">
    <div class="boot-stage">
      <!-- Pixel-art jack-in-the-box. The SVG is empty here and filled at runtime
           by js/boot-jib.js (rect-per-cell pixels, like the rest of RandOS's
           pixel art) into the animatable groups .jib-lid / .jib-jack (.jib-coil
           + .jib-head) / .jib-box / .jib-crank that boot.js + base.css drive.
           Built synchronously before boot.js runs; the opaque #boot cover means
           there's no flash before it paints. -->
      <svg class="boot-jib" id="boot-jib" viewBox="0 0 440 560" width="372" height="474"
           role="img" aria-label="RandOS booting" focusable="false"></svg>
      <div class="boot-wordmark">RandOS</div>
      <div class="boot-tagline">a desktop that rolls the dice</div>
    </div>
  </div>
  <!-- Builds the pixel-art jack into #boot-jib. MUST load before boot.js so the
       animatable groups exist when boot.js queries them. -->
  <script src="js/boot-jib.js"></script>
  <script src="js/boot.js"></script>
  <!-- Loaded LAST so every global it drives (rollWallpaper, rollCursor,
       getOpenWindows, relayoutWindows, rollSkin/applySkin, FX) already exists. -->
  <script src="js/chaos.js"></script>
</body>
</html>
