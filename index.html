<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RandOS</title>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
</head>
<body>
  <div id="desktop">
    <div id="icons"></div>
    <div id="taskbar"><span class="spacer"></span></div>
  </div>

  <script src="js/randomizer.js"></script>
  <script src="js/particles.js"></script>
  <script src="js/cursor.js"></script>
  <script src="js/wallpaper.js"></script>
  <script src="js/calc-math.js"></script>
  <script src="js/pixel-icons.js"></script>
  <script src="js/windows.js"></script>
  <script src="js/apps/calculator.js"></script>
  <script src="js/apps/clock.js"></script>
  <script src="js/apps/calendar.js"></script>
  <script src="js/apps/randomizer-app.js"></script>
  <script src="js/desktop.js"></script>

  <!-- Boot overlay: covers the screen from first paint so the desktop never
       flashes before the jack-in-the-box plays. boot.js either runs the
       animation or removes this instantly if already booted this session.
       Kept LAST in <body> and given an opaque background via .boot-cover so
       it paints over everything immediately, before boot.js even runs. -->
  <div id="boot" class="boot-cover" aria-hidden="true">
    <div class="boot-stage">
      <svg class="boot-jib" viewBox="0 0 320 360" width="320" height="360"
           role="img" aria-label="RandOS booting" focusable="false">
        <!-- Springing jack: a pure character (NO wordmark) on a coil. Hidden in
             the box, then pops up on jibPop. Drawn first so the lid sits over it.
             Box opening is centered on x=160; jack rests with feet near y=196. -->
        <g class="jib-jack">
          <!-- Coil spring (taller, more turns for a bigger pop) -->
          <path class="jib-coil" d="M160 210
            C 124 200, 124 182, 160 172
            C 196 162, 196 144, 160 134
            C 124 124, 124 106, 160 96
            C 196 86, 196 68, 160 58" />

          <!-- Body / torso with a ruffled clown collar -->
          <g class="jib-body">
            <!-- collar ruffle (scalloped circle behind the torso) -->
            <path class="jib-collar" d="M160 70
              q 14 -2 18 10 q 14 -6 16 8 q 12 2 4 14 q 10 8 -4 14
              q 2 14 -12 10 q -6 12 -18 4 q -12 8 -18 -4 q -14 4 -12 -10
              q -14 -6 -4 -14 q -8 -12 4 -14 q 2 -14 16 -8 q 4 -12 18 -10 Z" />
            <!-- torso -->
            <path class="jib-torso" d="M138 86
              C 132 112, 134 140, 144 154
              L 176 154 C 186 140, 188 112, 182 86 Z" />
            <!-- torso buttons -->
            <circle cx="160" cy="104" r="3.6" class="jib-button" />
            <circle cx="160" cy="120" r="3.6" class="jib-button" />
            <circle cx="160" cy="136" r="3.6" class="jib-button" />
            <!-- arms -->
            <path class="jib-arm" d="M139 92 C 116 96, 104 110, 100 128" />
            <path class="jib-arm" d="M181 92 C 204 96, 216 110, 220 128" />
            <!-- mitt hands -->
            <circle cx="98"  cy="132" r="9" class="jib-hand" />
            <circle cx="222" cy="132" r="9" class="jib-hand" />
          </g>

          <!-- Head: an expressive character face with shading -->
          <g class="jib-head">
            <!-- jester hat behind the head -->
            <g class="jib-hat">
              <path class="jib-hat-flop" d="M134 30
                C 112 14, 100 28, 118 44 C 104 40, 104 54, 120 54 Z" />
              <path class="jib-hat-flop" d="M186 30
                C 208 14, 220 28, 202 44 C 216 40, 216 54, 200 54 Z" />
              <path class="jib-hat-band" d="M132 50 Q160 40 188 50 L184 62 Q160 54 136 62 Z" />
              <circle cx="106" cy="50" r="5" class="jib-bell" />
              <circle cx="214" cy="50" r="5" class="jib-bell" />
              <circle cx="160" cy="34" r="5" class="jib-bell" />
            </g>
            <!-- face -->
            <circle cx="160" cy="62" r="34" class="jib-head-disc" />
            <!-- soft shading crescent on the right of the face -->
            <path class="jib-head-shade" d="M160 28 a34 34 0 0 1 0 68 a26 34 0 0 0 0 -68 Z" />
            <circle cx="160" cy="62" r="34" class="jib-head-ring" />
            <!-- rosy cheeks -->
            <circle cx="142" cy="70" r="6" class="jib-cheek" />
            <circle cx="178" cy="70" r="6" class="jib-cheek" />
            <!-- eyes (whites + pupils + glints) -->
            <ellipse cx="148" cy="56" rx="7" ry="8.5" class="jib-eye-white" />
            <ellipse cx="172" cy="56" rx="7" ry="8.5" class="jib-eye-white" />
            <circle cx="149" cy="57" r="3.4" class="jib-pupil" />
            <circle cx="173" cy="57" r="3.4" class="jib-pupil" />
            <circle cx="147.5" cy="55" r="1.3" class="jib-glint" />
            <circle cx="171.5" cy="55" r="1.3" class="jib-glint" />
            <!-- raised expressive brows -->
            <path class="jib-brow" d="M140 44 Q148 40 156 44" />
            <path class="jib-brow" d="M164 44 Q172 40 180 44" />
            <!-- nose -->
            <circle cx="160" cy="66" r="5" class="jib-nose" />
            <!-- big open grin -->
            <path class="jib-smile" d="M144 74 Q160 92 176 74 Q160 84 144 74 Z" />
          </g>
        </g>

        <!-- Box body — bigger, paneled, bolted, ornate crank -->
        <g class="jib-box">
          <rect x="72" y="208" width="176" height="128" rx="12" class="jib-box-body" />
          <!-- woodgrain / panel seams -->
          <rect x="86" y="236" width="148" height="86" rx="8" class="jib-box-panel" />
          <rect x="98" y="248" width="124" height="62" rx="6" class="jib-box-inset" />
          <line x1="160" y1="236" x2="160" y2="322" class="jib-box-seam" />
          <line x1="86"  y1="279" x2="234" y2="279" class="jib-box-seam" />
          <path class="jib-grain" d="M104 256 q14 6 0 12 M104 274 q14 6 0 12 M104 292 q14 6 0 12" />
          <path class="jib-grain" d="M216 256 q-14 6 0 12 M216 274 q-14 6 0 12 M216 292 q-14 6 0 12" />
          <!-- corner bolts -->
          <circle cx="84"  cy="220" r="3.6" class="jib-bolt" />
          <circle cx="236" cy="220" r="3.6" class="jib-bolt" />
          <circle cx="84"  cy="324" r="3.6" class="jib-bolt" />
          <circle cx="236" cy="324" r="3.6" class="jib-bolt" />
          <rect x="72" y="208" width="176" height="128" rx="12" class="jib-box-edge" />

          <!-- Lid: hinged at the back-left, flips open on jibLid -->
          <g class="jib-lid">
            <rect x="70" y="192" width="180" height="24" rx="7" class="jib-lid-top" />
            <rect x="84" y="198" width="152" height="9" rx="4" class="jib-lid-trim" />
            <circle cx="160" cy="203" r="3.4" class="jib-bolt" />
          </g>

          <!-- Ornate crank: hub, arm, decorative knob with a star center -->
          <g class="jib-crank">
            <line x1="248" y1="272" x2="284" y2="272" class="jib-crank-arm" />
            <circle cx="284" cy="272" r="11" class="jib-crank-knob" />
            <circle cx="284" cy="272" r="4.5" class="jib-crank-pin" />
            <circle cx="248" cy="272" r="8" class="jib-crank-hub" />
            <circle cx="248" cy="272" r="3.5" class="jib-crank-hub-pin" />
          </g>
        </g>
      </svg>
      <div class="boot-wordmark">RandOS</div>
      <div class="boot-tagline">a desktop that rolls the dice</div>
    </div>
  </div>
  <script src="js/boot.js"></script>
</body>
</html>
